<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>License Plate AI</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <header class="navbar">
    <div class="navbar-logo">
      <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9" stroke="#1a73e8" stroke-width="2.2" fill="none"/>
        <line x1="19" y1="19" x2="26" y2="26" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round"/>
        <text x="7.5" y="16.5" font-size="9" fill="#1a73e8" font-family="DM Sans, sans-serif" font-weight="700">Aq</text>
      </svg>
      <span class="navbar-title">License Plate AI</span>
    </div>
    <div class="navbar-badge">
      <span class="badge-dot"></span>
      System Ready
    </div>
  </header>

  <main class="main-container">

    <section class="panel left-panel">

      <button class="btn-scan" id="scanBtn" onclick="document.getElementById('fileInput').click()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Scan Vehicle
      </button>

      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)"/>

      <div class="image-wrapper" id="imageWrapper">
        <div class="detection-label" id="detectionLabel" style="display:none">
          PLATE DETECTED (CONFIDENCE: <span id="confLabel">98%</span>)
        </div>

        <div class="image-placeholder" id="imagePlaceholder">
          <svg width="48" height="48" fill="none" stroke="#b0bec5" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <p>Click "Scan Vehicle" to load an image</p>
        </div>

        <img id="previewImg" class="preview-img" src="" alt="Vehicle" style="display:none"/>

        <div class="plate-box" id="plateBox" style="display:none">
        </div>
      </div>

      <button class="btn-analyze" id="analyzeBtn" onclick="analyzePlate()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        Analyze Plate
      </button>

    </section>

    <aside class="panel right-panel">
      <div class="result-header">
        <svg width="18" height="18" fill="none" stroke="#555" stroke-width="1.8" viewBox="0 0 24 24">
          <rect x="1" y="7" width="22" height="10" rx="2"/>
          <path d="M5 11h.01M19 11h.01"/>
        </svg>
        DETECTED PLATE
      </div>

      <div class="result-body" id="resultBody">
        <div class="result-empty" id="resultEmpty">
          <svg width="40" height="40" fill="none" stroke="#d0d5dd" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="1" y="7" width="22" height="10" rx="2"/>
            <path d="M5 11h.01M19 11h.01"/>
          </svg>
          <p>No results</p>
        </div>

        <div id="resultData" style="display:none">
          <p class="result-label">PLATE:</p>
          <p class="result-plate" id="resultPlate">A1 B2C3D</p>
          <p class="result-ocr">OCR CONFIDENCE: <span id="resultOCR">99.1%</span></p>
        </div>
      </div>
    </aside>

  </main>

  <div class="loading-overlay" id="loadingOverlay" style="display:none">
    <div class="spinner"></div>
    <p>Analyzing plate...</p>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
